<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        :root {
            --primary-pink: #ffb6c1; 
            --bg-color: #fff0f5;    
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Arial', sans-serif; background-color: var(--bg-color);
        }

        /* Animation กล่องสั่นดุ๊กดิ๊ก */
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        .gift-box {
            display: inline-block;
            font-size: 6rem;
            margin-bottom: 20px;
            animation: shake 0.5s infinite;
            cursor: pointer;
            user-select: none;
        }

        /* หน้าแรก */
        #start-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            text-align: center; color: white;
            transition: opacity 0.5s;
        }

        /* หน้าเอฟเฟกต์ดอกไม้ */
        #flower-screen {
            display: none; height: 100%; width: 100%;
            position: absolute; top: 0; left: 0;
            background-color: #fff0f5;
            z-index: 100;
        }

        /* หน้านับถอยหลัง */
        #countdown-screen {
            display: none; height: 100%; align-items: center; justify-content: center;
            font-size: 10rem; font-weight: bold; color: #ff69b4;
            background-color: var(--primary-pink);
        }

        /* หน้าข้อความอวยพร */
        #message-screen {
            display: none; height: 100%; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px; position: relative;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        .wish-box {
            background: white; padding: 40px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10; max-width: 85%;
            animation: bounceIn 0.8s ease-out;
        }

        /* ดอกไม้พุ่งกระจาย */
        .flower-pop {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            animation: burst 3s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
        }

        /* ของลอยในหน้าสุดท้าย */
        .floating {
            position: absolute; bottom: -50px;
            user-select: none; pointer-events: none;
            animation: floatUp 6s linear forwards;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(30deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="gift-box" onclick="triggerSequence()">🎁</div>
        <h1>What's in the box?</h1>
        <p>..👆🏻Click at the box👆🏻..</p>
    </div>

    <div id="flower-screen"></div>

    <div id="countdown-screen">
        <span id="number">3</span>
    </div>

    <div id="message-screen">
        <div class="wish-box">
            <h1>🎂 Happy Birthday to "Klipbua" kub 🎂</h1>
            <p>🎉 20 ขวบแล้ว มีความสุขมากๆนะครับ 🎉</p>
            <p>ขอให้ไม่เจ็บไม่ป่วย ได้กินแต่ของอร่อย</p>
            <p>ขอให้เจอแต่คนที่ดีคนที่จริงใจ รักตัวเองมาก ๆ นะครับ :)</p>
            <div style="color: #ff69b4; font-size: 2rem; margin-top: 20px;">💖✨</div>
        </div>
    </div>

    <script>
        function triggerSequence() {
            // 1. ซ่อนหน้าแรก เปิดหน้าดอกไม้
            document.getElementById('start-screen').style.display = 'none';
            const flowerScreen = document.getElementById('flower-screen');
            flowerScreen.style.display = 'block';

            // สร้างดอกไม้เยอะๆ
            for(let i=0; i<100; i++) {
                setTimeout(createFlowerPop, i * 20);
            }

            // 2. รอ 3 วินาทีแล้วค่อยไปหน้านับถอยหลัง
            setTimeout(() => {
                flowerScreen.style.display = 'none';
                startCountdown();
            }, 3500);
        }

        function createFlowerPop() {
            const flowers = ['🌸', '🌼', '🌷', '🌹', '🌺', '🌻'];
            const el = document.createElement('div');
            el.className = 'flower-pop';
            el.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            
            // สุ่มทิศทางการพุ่งจากกลางจอ
            const angle = Math.random() * Math.PI * 2;
            const distance = 100 + Math.random() * 300;
            el.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            el.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            el.style.setProperty('--tr', Math.random() * 360 + 'deg');
            
            el.style.left = '50%';
            el.style.top = '50%';
            
            document.getElementById('flower-screen').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function startCountdown() {
            const countdownScreen = document.getElementById('countdown-screen');
            countdownScreen.style.display = 'flex';
            let count = 3;
            const numberLabel = document.getElementById('number');
            
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    numberLabel.innerText = count;
                } else {
                    clearInterval(timer);
                    showMessage();
                }
            }, 1000);
        }

        function showMessage() {
            document.getElementById('countdown-screen').style.display = 'none';
            document.getElementById('message-screen').style.display = 'flex';
            setInterval(createFloatingElement, 400);
        }

        function createFloatingElement() {
            const icons = ['🎈', '💖', '✨', '🌸', '💝', '🎂'];
            const el = document.createElement('div');
            el.className = 'floating';
            el.innerText = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 20 + 25) + 'px';
            el.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.getElementById('message-screen').appendChild(el);
            setTimeout(() => el.remove(), 8000);
        }
    </script>
</body>
</html>
